version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai-anthropologist-db
    environment:
      POSTGRES_USER: anthropologist
      POSTGRES_PASSWORD: dev_password_change_in_prod
      POSTGRES_DB: ai_anthropologist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anthropologist"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Job Queue
  redis:
    image: redis:7-alpine
    container_name: ai-anthropologist-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-anthropologist-backend
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://anthropologist:dev_password_change_in_prod@postgres:5432/ai_anthropologist
      REDIS_URL: redis://redis:6379
      IBM_WATSONX_API_KEY: ${IBM_WATSONX_API_KEY}
      IBM_WATSONX_PROJECT_ID: ${IBM_WATSONX_PROJECT_ID}
      IBM_WATSONX_URL: ${IBM_WATSONX_URL}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm start

  # Background Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-anthropologist-worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://anthropologist:dev_password_change_in_prod@postgres:5432/ai_anthropologist
      REDIS_URL: redis://redis:6379
      IBM_WATSONX_API_KEY: ${IBM_WATSONX_API_KEY}
      IBM_WATSONX_PROJECT_ID: ${IBM_WATSONX_PROJECT_ID}
      IBM_WATSONX_URL: ${IBM_WATSONX_URL}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      WS_URL: http://backend:4000
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run worker

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-anthropologist-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: http://backend:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
    # Use the built standalone output from the image; do not mount source in production
    depends_on:
      - backend
    command: node server.js

volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  default:
    name: ai-anthropologist-network

